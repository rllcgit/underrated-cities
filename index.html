    "slug": "santiago"
  },
  {
    "name": "Kristiansand",
    "country": "Norway",
    "lat": 58.1599,
    "lng": 7.9956,
    "blurb_html": "<p>Located at the southern tip of Norway, <strong>Kristiansand</strong> manages to both quaint and cosmopolitan.</p><p>Its old town, Posebyen, features the largest cluster of <strong>historic wooden houses</strong> in Northern Europe – which is what you'll see featured in many photos of the city. On one of the many sunny days (compared to the rest of Norway), the seaside is incredibly attractive – <strong>Hamresanden</strong> is especially worth visiting if you like beach strolls.</p><p>Another nice way to spend a morning is to take a ferry to one of the nearby islands – or even hire a boat and sail along the coast.</p><p><strong>Our tip:</strong> to fully embrace the maritime theme, get a table by the water and enjoy some fresh seafood at <a href=\"https://www.sjohuset.no/\" target=\"_blank\" rel=\"noopener\">Sjøhuset</a>.</p>",
    "image": "images/kristiansand.jpeg",
    "slug": "kristiansand"
  },
  {
    "name": "Otaru",
    "country": "Japan",
    "lat": 43.1907,
    "lng": 140.9947,
    "blurb_html": "<p>There's a particular type of city curse that we call \"<em>a pretty good city, on the way to somewhere more exciting</em>\".</p><p><strong>Otaru</strong> is a prime example.</p><p>Most people will pass through Otaru \"anticipating pow in Niseko\" or \"heading back to Sapporo\" but it deserves <strong>at least</strong> a night for itself.</p><p>It's not just the picturesque canal, it's the <a href=\"https://stoneandiron.jp/en/\" target=\"_blank\" rel=\"noopener\">coffee shops</a> hidden in old warehouses. It's the way the streets run gently downhill all the way from the train station to the sea, it's the snow piled head-high on the side of every road.</p><p><strong>Our tip:</strong> even if Otaru's not on your way to somewhere, the coastal train from Sapporo is worth it alone - and easily done as a day trip.</p>",
    "image": "images/otaru.jpeg",
    "slug": "otaru"
  },
  {
    "name": "Kuala Terengganu",
    "country": "Malaysia",
    "lat": 5.3117,
    "lng": 103.1324,
    "blurb_html": "<p>Here's a sentence you won't read often: <strong>Kuala Terengganu</strong> has better food than Penang.</p><p>We said it. The <strong>nasi dagang</strong> alone justifies the flight.</p><p>Sitting where the Terengganu River flows into the South China Sea, K.T. is what happens when <strong>traditional Malay culture</strong> remains undiluted by the demands of tourism. Wooden boats crowd the waterfront, the Central Market sells <em>actual</em> batik, and the mosques are focused on pleasing local worshippers instead of the 'gram.</p><p><strong>Our tip:</strong> the <a href=\"https://www.tti.com.my/crystal-mosque/\" target=\"_blank\" rel=\"noopener\">Crystal Mosque</a> looks like a prop from a sci-fi film. Worth the detour even if religious architecture isn't usually your thing. Go at sunset.</p>",
    "image": "images/kuala-terengganu.jpeg",
    "slug": "kuala-terengganu"
  },
  {
    "name": "Bucharest",
    "country": "Romania",
    "lat": 44.4268,
    "lng": 26.1025,
    "blurb_html": "<p>Communist brutalism meets belle époque grandeur meets nobody-asked-for-your-opinion-about-urban-planning.</p><p>That's <strong>Bucharest.</strong></p><p>The Palace of Parliament is the <strong>world's heaviest building</strong>, which tells you everything about Ceaușescu's priorities.</p><p>But look past the concrete and you'll find art nouveau gems in Cotroceni, Berlin-level nightlife, and the <strong>decayed elegance</strong> of the Lipscani district.</p><p>It's genuinely rough around the edges. Which is <strong>exactly</strong> why it works.</p><p><strong>Our tip:</strong> <a href=\"https://www.carucubere.ro/\" target=\"_blank\" rel=\"noopener\">Caru' cu Bere</a> looks touristy as hell (gothic Revival interiors, oh yes) but the <em>sarmale</em> and <em>mici</em> are the real deal.</p>",
    "image": "images/bucharest.jpeg",
    "slug": "bucharest"
  },
  {
    "name": "Praia",
    "country": "Cabo Verde",
    "lat": 14.9331,
    "lng": -23.5133,
    "blurb_html": "<p>If you're reading this from Sal or Boa Vista's beach resorts, we have bad news: you're in the <strong>wrong place</strong>.</p><p><strong>Praia</strong> sprawls across a plateau above the Atlantic, off the coast of West Africa. You'll sometimes hear people complain about it being boring, but it depends on what you're hoping to get out of your time in Cabo Verde. If all you need is relaxation at a resort, you can skip Praia – but if you want to understand local culture and history, it's <em>the</em> spot.</p><p>Down at Quebra Canela, you can swim alongside people finishing their workday while <strong>fishing boats</strong> roll in. It's hot, dusty, and unforgettable.</p><p><strong>Our tip:</strong> track down live <em>morna</em> at <a href=\"https://www.facebook.com/quintaldamusica/\" target=\"_blank\" rel=\"noopener\">Quintal da Música</a>. Bring your grogue tolerance.</p>",
    "image": "images/praia.jpeg",
    "slug": "praia"
  },
  {
    "name": "Tampere",
    "country": "Finland",
    "lat": 61.4978,
    "lng": 23.761,
    "blurb_html": "<p>While Helsinki soaks up all the Nordic design tourism and Lapland gets the Northern Lights crowd, <strong>Tampere</strong> sits quietly between two lakes, officially holding the (glorious) title: <em>Sauna Capital of the World</em>.</p><p>And we're not talking about a few hotel spas. We're talking 60+ public saunas, including Rajaportti – Finland's oldest still in operation since 1906 – and waterfront spots like Rauhaniemi where locals jump straight from the steam into the lake. Year-round. Yes, <strong>even when it's frozen</strong>.</p><p>Beyond the sauna pilgrimage, Tampere has red-brick industrial charm (it's nicknamed the \"Manchester of the North\", which, well, OK), <strong>excellent doughnuts</strong> at Pyynikki Observation Tower, and a walkable city center. What more could you want?!?!</p><p><strong>Our tip:</strong> head to Sauna Restaurant Kuuma on Lake Pyhäjärvi for the full experience: Nordic food, rooftop views, and of course, more saunas.</p>",
    "image": "images/tampere.jpeg",
    "slug": "tampere"
  },
  {
    "name": "Accra",
    "country": "Ghana",
    "lat": 5.6037,
    "lng": -0.187,
    "blurb_html": "<p><strong>Accra</strong> doesn't get the safari crowds that East Africa pulls, but Ghana's capital is one of West Africa's most genuinely underrated cities – and we haven't even <em>mentioned</em> the beaches yet.</p><p>Markets like Makola give chaotic energy, the nightlife at Labadi Beach runs until dawn, and <strong>jollof rice arguments</strong> get serious (Ghanaians claim theirs is better than Nigeria's, and we aren't brave enough to make a comment either way).</p><p>But what really sets Accra apart is how accessible it is. English is widely spoken, it's safer than most African capitals, and the growing <strong>tech scene</strong> means you'll pull decent wifi at traditional drumming performances.</p><p><strong>Our tip:</strong> skip the standard restaurants and head to <strong>Buka</strong> for proper West African food. The banku with tilapia and egusi soup are the go.</p>",
    "image": "images/accra.jpeg",
    "slug": "accra"
  },
  {
    "name": "Samaipata",
    "country": "Bolivia",
    "lat": -18.1798,
    "lng": -63.8732,
    "blurb_html": "<p><strong>Samaipata</strong> is a bohemian mountain village nestled in Bolivia's foothills – only three hours from Santa Cruz, but a world apart in terms of climate.</p><p>Most people come for El Fuerte, a UNESCO World Heritage site with Bolivia's largest pre-Inca ruins – an enormous carved rock temple that predates the Incas by over a thousand years. But they end up staying for the vineyards, the waterfalls, the expat-run cafes, and the subtle but inescapable sense that <strong>time moves differently here.</strong></p><p>It's small enough to walk end-to-end in twenty minutes, international enough to have excellent <strong>Turkish street food</strong>, and off-the-beaten-track enough that you can still find handmade jewelry in artisan shops that's actually legit, not \"handmade\" by \"artisans\".</p><p><strong>Our tip:</strong> grab a shawarma or burger at <strong>La Cocina.</strong> Turkish owner Serdar bakes the bread fresh daily and it has a rep as the best in Bolivia.</p>",
    "image": "images/samaipata.jpeg",
    "slug": "samaipata"
  },
  {
    "name": "Tétouan",
    "country": "Morocco",
    "lat": 35.5889,
    "lng": -5.3626,
    "blurb_html": "<p>The traveller to Morocco usually experiences the country in three phases: the honeymoon phase, followed by borderline rage, then finally an almost reluctant love – usually sparked by visiting underrated cities like <strong>Tétouan</strong>.</p><p>After being welcomed by <strong>gleaming whitewashed villas</strong> nestled between the Rif mountains and Alboran Sea, you'll soon understand that Tétouan's beauty is more than skin-deep.</p><p>After the Christian reconquest of Al-Andalus, many of the region's Arabs fled their homes in Granada and resettled in Tétouan – which partly explains the <strong>abundance of orange trees and marble fountains</strong>, and the similarity to the Pueblos Blancos of Andalusia.<a href=\"https://artofwayfaring.com/destinations/the-phrygian-valley/\" target=\"_blank\" rel=\"noopener\">​</a></p><p><strong>Our tip: </strong>head to the UNESCO-listed <a href=\"https://whc.unesco.org/en/list/837/\" target=\"_blank\" rel=\"noopener\">Medina</a>, and – as we so often suggest – wander without a destination in mind.</p>",
    "image": "images/tetouan.jpeg",
    "slug": "tétouan"
  },
  {
    "name": "The Three Cities",
    "country": "Malta",
    "lat": 35.8876,
    "lng": 14.5186,
    "blurb_html": "<p>OK – <strong>Vittoriosa</strong>, <strong>Senglea</strong>, and <strong>Cospicua</strong> are <em>technically </em>multiple cities, but the point is that they're not Valletta.</p><p>Somehow, despite being a short dgħajsa ride across Grand Harbour, they've managed to escape the cruise-ship throngs and retain their <strong>old-world charm</strong>.</p><p>At sunrise, as you navigate the labyrinthine streets between the fortifications, you'll notice that all the limestone façades are bathed in a golden light. Leaving you no choice but to kick off your day with a <strong>pastizzi and Maltese coffee</strong> while watching the world go by.</p><p>Rude not to, really. <strong> </strong> <strong>Our tip:</strong> if you like seafood, head to <a href=\"https://www.tripadvisor.com/Restaurant_Review-g1748965-d10395519-Reviews-Le_Poisson_Fresh_Fish_Take_Away-Cospicua_Bormla_Island_of_Malta.html\" target=\"_blank\" rel=\"noopener\">Le Poisson</a> for what some would argue is the most delicious fish in Europe.</p>",
    "image": "images/the-three-cities.jpeg",
    "slug": "the-three-cities"
  },
  {
    "name": "Ishigaki",
    "country": "Japan",
    "lat": 24.3448,
    "lng": 124.1572,
    "blurb_html": "<p>Find Japan on a map. Now head south and slightly west, into the ocean. Keep going, you're only at Toshima! Oh, you <em>finally</em> made it to Okinawa? KEEP GOING.</p><p>Eventually, just before you hit Taiwan, you're going to find <strong>Ishigaki</strong>. You're still in Japan, but this ain't Kyoto – floral shirts, folk music, and golden beaches are the vibe.</p><p>You can circumnavigate the island in as little as three hours, but there's enough here to keep you going at least a couple of weeks – and that's before you start <strong>taking ferries</strong> to smaller islands even further out.</p><p>If nothing else, it's worth the flight just for the local <strong>wagyu sushi</strong> and sweet potato tempura nom nom nom nom nom.</p><p><strong>Our tip: </strong>at the very westernmost point of Japan, there's a cafe with the unbelievably excellent name \"<a href=\"https://maps.app.goo.gl/hTzUjh6j7PQAdbCb8\" target=\"_blank\" rel=\"noopener\">Moist Roll Cafe</a>\". Go there and eat a moist roll, even if it means taking the <a href=\"https://soranews24.com/2021/11/18/a-trip-to-hell-on-japans-vomit-ship-is-it-as-bad-as-everyone-says-it-is/\" target=\"_blank\" rel=\"noopener\">Vomit Ship</a> from Ishigaki.</p>",
    "image": "images/ishigaki.jpeg",
    "slug": "ishigaki"
  },
  {
    "name": "Windhoek",
    "country": "Namibia",
    "lat": -22.5609,
    "lng": 17.0658,
    "blurb_html": "<p>The most common crime committed against <strong>Windhoek</strong> is only spending one night before bolting for Etosha or the Namib Desert. Understandable, because those landscapes will rearrange your brain. But this small city rewards those who just stop and breathe for a day or two.</p><p>On foot, it's easy to navigate: German colonial buildings and a Lutheran church that looks like a fairytale prop (<strong>Christuskirche</strong>), sitting incongruously in the middle of southern Africa. The <strong>Independence Memorial Museum</strong> is your essential orientation point. And a guided walk through the township of <strong>Katutura</strong> will tell you more about this country's recent history than any guidebook.</p><p>It's not a buzzing metropolis, sure, but it's not just a transit point either.</p><p><strong>Our tip: </strong>skip the tourist-focused beer halls and eat<strong> kapana</strong> at the <a href=\"https://share.google/BKitlSvu2MrLJf6PV\" target=\"_blank\" rel=\"noopener\">Oshetu Community Market</a>. Grilled meat, open fire, no fuss.</p>",
    "image": "images/windhoek.jpeg",
    "slug": "windhoek"
  },
  {
    "name": "Sacramento",
    "country": "USA",
    "lat": 38.5816,
    "lng": -121.4944,
    "blurb_html": "<p>Capital of California. Should be one of the more prestigious addresses in America. Instead, the rest of the state treats it as a vaguely embarrassing government town best driven through, at speed, on the I-5.</p><p>Here's the thing: <strong>Sacramento is California's actual larder</strong>. At the heart of the <strong>Central Valley</strong>, it's become America's <strong>Farm-to-Fork Capital</strong>, and the claim holds up. Chefs here change their menus based on what arrived from the fields that morning, which sounds like marketing until you experience it.</p><p>The bones are solid too: walkable Midtown streets, <strong>Gold Rush</strong> history in Old Sacramento. It just, well, dies later at night. But that's OK.</p><p><strong>Our tip: </strong><a href=\"https://frankfats.com/\" target=\"_blank\" rel=\"noopener\">Frank Fat's</a> has served Chinese-American classics on K Street since 1939. Order the banana cream pie. No argument pls.</p>",
    "image": "images/sacramento.jpeg",
    "slug": "sacramento"
  },
  {
    "name": "Birgunj",
    "country": "Nepal",
    "lat": 27.0104,
    "lng": 84.877,
    "blurb_html": "<p>There's not much in <strong>Birgunj</strong> for the itinerary-minded traveller. It's a <strong>trading town on the Nepal-India border</strong>, flat and busy, and most people passing through are there to move goods, not take photos.</p><p>The people of Birgunj, though, are worth the detour. Walk any street and you'll see shopkeepers waving at friends on passing rickshaws, beckoning them in for tea. At <a href=\"https://maps.app.goo.gl/GhTF32wmjeohppXF7\" target=\"_blank\" rel=\"noopener\">Balaji Tea Shop</a>, the founder's sons still brew hot milk tea in single-use terracotta cups.</p><p>The town, improbably, also has a <strong>Toastmasters club</strong>(!) that meets Thursday afternoons and welcomes drop-ins. All of which tells you something about what this place is <em>really</em> like.</p><p><strong>Our tip:</strong> the rasmalai at <a href=\"http://maps.app.goo.gl/LBbrbVHAxr4EkKYw8\" target=\"_blank\" rel=\"noopener\">Mijbaani Sweets</a> is, by local consensus, the best in the valley. A family business, generations deep.</p><p><em>(thanks for the recs, <a href=\"https://www.gyulasimonyi.com/\" target=\"_blank\" rel=\"noopener\">Gyula</a>!)</em></p>",
    "image": "images/birgunj.jpeg",
    "slug": "birgunj"
  },
  {
    "name": "Wrocław",
    "country": "Poland",
    "lat": 51.1079,
    "lng": 17.0385,
    "blurb_html": "<p>Despite the image above giving a 'liminal spaces' vibe, <strong>Wrocław</strong> is full of life – about 20% of the 675,000 population are students.</p><p>And despite being one of the last cities to fall in the Second World War, with parts of the central city being destroyed to build an evacuation airfield, there's plenty of <strong>historic architecture</strong> to go around.</p><p>Assuming you're avoiding the (very cold) winter and keen to lounge around outdoors, there are also <strong>44 parks</strong> covering over 800 hectares (2,000 acres) spread across the city.</p><p><strong>Our tip:</strong> stroll the Odra river promenade on a warm evening. Boring, in a good way.</p>",
    "image": "images/wroclaw.jpeg",
    "slug": "wrocław"
  },
  {
    "name": "Lautoka",
    "country": "Fiji",
    "lat": -17.6163,
    "lng": 177.4509,
    "blurb_html": "<p>Even veteran travellers to Fiji don't exactly make a beeline for <strong>Lautoka</strong>, the country's third largest city. And to be fair, if you're only in Fiji for beaches and snorkelling, you can safely give it a miss. But Lautoka has an energy and charm that make it a microcosm of Fiji's overall appeal.</p><p>Its <strong>majority Indian population</strong> – a relic of the colonial era, when Britain brought in extra workers for the sugarcane plantations – makes the city feel a bit like a miniature Kanpur in the South Pacific.</p><p>Wander aimlessly along the bustling yet tidy streets, lingering to chat with friendly shopkeepers – then cool down with some <strong>fresh mangoes</strong> from the atmospheric indoor vegetable market.</p><p><strong>Our tip:</strong> grab one of Fiji's best thalis at the <a href=\"https://maps.app.goo.gl/sF8M8ZtwZtK7RUhS9\" target=\"_blank\" rel=\"noopener\">South Seas Restaurant</a>.</p>",
    "image": "images/lautoka.jpeg",
    "slug": "lautoka"
  },
  {
    "name": "Dakar",
    "country": "Sénégal",
    "lat": 14.7167,
    "lng": -17.4677,
    "blurb_html": "<p>Situated at the westernmost tip of Africa, and surrounded on three sides by the Atlantic, <strong>Dakar</strong> has a truly maritime feel. Despite having all the congestion and urban sprawl that you'd expect from a capital city, it's managed to keep its soul alive.</p><p>To experience that soul in all its guises, you'll need to catch a ferry to the island of <strong>Gorée</strong>: it's a 20-minute sailing that takes you back 200 years. Completely free of cars, Gorée's salt-lashed colonial edifices point to a darker side of West African history: the <strong>transatlantic slave trade</strong>. Beyond the confronting physical experience, you can also explore the academic controversy surrounding the infamous \"Door of No Return\".</p><p>As you catch the sunset ferry back to Dakar, you'll have a new understanding of the post-colonial African city that you're returning to.</p><p><strong>Our tip: </strong>try <a href=\"https://en.wikipedia.org/wiki/Thieboudienne\" target=\"_blank\" rel=\"noopener\">thieboudienne</a>, the national dish of rice and fish which remains a symbol of Senegalese hospitality.</p>",
    "image": "images/dakar.jpeg",
    "slug": "dakar"
  },
  {
    "name": "St John's",
    "country": "Newfoundland",
    "lat": 47.5615,
    "lng": -52.7126,
    "blurb_html": "<p>Aside from a few rowdy Canadians sure to blow up our inboxes with deep (but polite) rage, we think you'll agree this one is a true underrated city – if only because you've <strong>never heard of it.</strong></p><p>With all the charms of a small town, but enough happening to keep you occupied for a month or three, <strong>St John's</strong> is a European-feeling Canadian gem facing the wild, wild Atlantic.</p><p>And if you're outdoorsy, you might end up 'trapped' in Newfoundland – from city-edge hikes, to deep pow in Corner Brook, to truly remote national parks, there's a<strong> lifetime of adventure</strong> waiting to lure you in.</p><p><strong>Our tip: <a href=\"https://maps.app.goo.gl/khnnkYvcwjd4FqJb6\" target=\"_blank\" rel=\"noopener\">Gros Morne National Park</a> is absolutely incredible (and also happens to be a scene in the 2006 Minaal Origins road trip)</strong></p>",
    "image": "images/st-johns.jpeg",
    "slug": "st-johns"
  },
  {
    "name": "Chengdu",
    "country": "China",
    "lat": 30.5728,
    "lng": 104.0668,
    "blurb_html": "<p>Pop quiz: <strong>Chengdu</strong> has over 21M people, is China's 4th-largest city – yet could you locate it on a map?</p><p>I ask that with zero judgement – kinda ironically, geography is not a personal strong point – but the point is that China's <strong>immense size</strong> and flashy eastern cities tend to obscure some smaller(!) gems.</p><p>Chengdu is closer to Tibet than to the coast. You're probably more familiar with the province it sits inside, <strong>Sichuan</strong> – home of the delicious-but-a-bit-disconcerting-feeling pepper.</p><p>You'll get more of an old-school China vibe compared to Shanghai and Beijing, relatively better access to nature, and oh maaaaan – <strong>the food</strong>.</p><p><strong>Our tip:</strong> <a href=\"https://www.siftandsimmer.com/wp-content/uploads/2018/06/healthier-sichuan-style-guo-kui4-683x1024.jpg\" target=\"_blank\" rel=\"noopener\">Guo kui</a> (酥饼) – just hurry up and eat it and thank me later.</p>",
    "image": "images/chengdu.jpeg",
    "slug": "chengdu"
  },
  {
    "name": "Tbilisi",
    "country": "Georgia",
    "lat": 41.7151,
    "lng": 44.8271,
    "blurb_html": "<p>Located on a historical crossroads between Europe and Asia, <strong>Tbilisi</strong> retains a ton of its <strong>old-school</strong> <strong>charm</strong> despite having endured a long period of Soviet rule.</p><p>Its food and architecture blend Turkish, Persian, Armenian and Russian influences. In its old town – beneath a <strong>crumbling hilltop fortress</strong> – a mosque, synagogue, and Orthodox church stand practically side by side.</p><p>Our tip: visit the <strong>National Botanical Garden</strong>, very much an underrated attraction inside an underrated city.</p>",
    "image": "images/tbilisi.jpeg",

  },
  {

    "country": "Thailand",
    "lat": 18.7883,
    "lng": 98.9853,
    "blurb_html": "<p>Ok, ok – it's a bit controversial to call <strong>Chiang Mai</strong> \"underrated\" when it's one of the most popular destinations in Asia. But there's a growing hot take among Asia explorers that Chiang Mai is <em>overrated</em>, and we disagree<em>.</em></p><p>Yeah, it's packed with down-dog-doing, chakra-balancing digital nomads and other tourists. Yes, it's easy to get jaded if you're there too long. But when you get away from the tourist traps, it remains a truly wonderful little city: <strong>world-class food</strong>, leafy and peaceful lanes, and a cosmopolitan vibe.</p><p><strong>Our tip:</strong> hike up the forested mountain trail to Wat Pha Lat, then catch a <em>songthaew</em> to Doi Pui Hmong village.</p>",

  {

    "country": "Japan",
    "lat": 33.5904,
    "lng": 130.4017,
    "blurb_html": "<p>Walking around <strong>Fukuoka</strong>, you wouldn't pick it to be Japan's sixth-largest city.</p><p>A compact downtown, accessible parks, and (personal obsession alert) an airport within 10min(!) of the city center gives it a <strong>snug vibe</strong>.</p><p>On top of that, geography and a forward-thinking city hall have combined to encourage an <strong>energetic subculture</strong> of entrepreneurs and immigrants.</p><p><strong>Our tip:</strong> indulge – repeatedly, joyously, excessively – in Japan's best (and some would argue, only) <em>yatai</em> street food culture.</p>",

  {

    "blurb_html": "<p>The state of Rajasthan is famous, as is its capital Jaipur and lakeside city Udaipur.</p><p>But another Rajasthani city, <strong>Jodhpur</strong>, is more widely known by equestrians (thanks to the eponymous riding pants) than it is among most explorers.</p><p>That's a shame: Jodhpur's 15th-century <strong>Mehrangarh Fort</strong> is one of the most impressive historical sites in Asia. Scale the walls, see the Blue City unfolding in front you, and try to spot all the lanes and rooftops you explored earlier.</p><p><strong>Our tip:</strong> wander the labyrinthine streets below the fort at sunset, and you might be invited to join a game of alleyway cricket.</p><p>Need a bag before you hit the road?</p><p>We've got you, with <strong>free shipping</strong> on orders over $400 to 60+ countries: <a href=\"https://www.minaal.com/collections/bags\" target=\"_blank\" rel=\"noopener\">SHOP BAGS</a></p>",

// --- Map setup ---
const worldBounds = L.latLngBounds([[-70, -170], [80, 190]]);
const map = L.map('map', {
  zoomControl: false,
  attributionControl: true,
  minZoom: 3,
  maxBounds: worldBounds,
  maxBoundsViscosity: 1.0
}).setView([25, 15], 3);

L.control.zoom({ position: 'topright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19,
  noWrap: true
}).addTo(map);

// Fit map to show all cities with padding
const bounds = L.latLngBounds(CITIES.map(c => [c.lat, c.lng]));
map.fitBounds(bounds, { padding: [50, 50] });

// --- Markers ---
const markers = [];
let activeMarker = null;

CITIES.forEach((city, i) => {
  const icon = L.divIcon({
    className: 'city-marker-wrapper',
    html: '<div class="city-marker" data-index="' + i + '"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  const marker = L.marker([city.lat, city.lng], { icon })
    .addTo(map)
    .on('click', () => openCity(i));

  marker.bindTooltip(city.name, {
    direction: 'top',
    offset: [0, -8],
    className: 'city-tooltip'
  });

  markers.push(marker);
});

// --- City list ---
const listUl = document.getElementById('city-list-ul');
const sortedCities = CITIES.map((c, i) => ({ ...c, idx: i }))
  .sort((a, b) => a.name.localeCompare(b.name));

sortedCities.forEach(city => {
  const li = document.createElement('li');
  li.innerHTML = city.name + ' <span class="list-country">' + city.country + '</span>';
  li.addEventListener('click', () => {
    openCity(city.idx);
    document.getElementById('city-list').classList.remove('open');
  });
  listUl.appendChild(li);
});

document.getElementById('counter').textContent = CITIES.length;

document.getElementById('city-list-toggle').addEventListener('click', () => {
  document.getElementById('city-list').classList.toggle('open');
});

map.on('click', () => {
  document.getElementById('city-list').classList.remove('open');
});

// --- Throw a dart ---
document.getElementById('dart-btn').addEventListener('click', () => {
  const randomIndex = Math.floor(Math.random() * CITIES.length);
  document.getElementById('city-list').classList.remove('open');
  openCity(randomIndex);
});

// --- Panel ---
function openCity(index) {
  const city = CITIES[index];
  const panel = document.getElementById('panel');
  const img = document.getElementById('panel-image');

  // Image
  if (city.image) {
    img.src = city.image;
    img.alt = city.name + ', ' + city.country;
    img.classList.remove('hidden');
  } else {
    img.classList.add('hidden');
  }

  document.getElementById('panel-city').textContent = city.name;
  document.getElementById('panel-country').textContent = city.country;
  document.getElementById('panel-body').innerHTML = city.blurb_html;

  // Reset scroll
  document.getElementById('panel-scroll').scrollTop = 0;

  // Highlight active marker
  if (activeMarker !== null) {
    markers[activeMarker].getElement().querySelector('.city-marker').classList.remove('active');
  }
  markers[index].getElement().querySelector('.city-marker').classList.add('active');
  activeMarker = index;

  panel.classList.add('open');

  // Pan map: place the city at the center of the visible area (left of panel)
  const targetZoom = Math.max(map.getZoom(), 5);
  const panelWidth = panel.offsetWidth;
  const mapWidth = map.getContainer().offsetWidth;
  // On mobile the panel covers everything — no offset needed
  const offset = panelWidth >= mapWidth ? 0 : panelWidth / 2;
  const cityPoint = map.project([city.lat, city.lng], targetZoom);
  const offsetCenter = map.unproject([cityPoint.x + offset, cityPoint.y], targetZoom);
  map.setView(offsetCenter, targetZoom, { animate: true, duration: 0.4 });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeMarker !== null) {
    markers[activeMarker].getElement().querySelector('.city-marker').classList.remove('active');
    activeMarker = null;
  }
}

document.getElementById('close-btn').addEventListener('click', closePanel);

// Prevent panel touch events from reaching the map (fixes mobile scroll reset)
const panelEl = document.getElementById('panel');
const panelScroll = document.getElementById('panel-scroll');

panelEl.addEventListener('touchmove', (e) => {
  e.stopPropagation();
}, { passive: true });

// Stronger fix for Brave and non-Safari iOS browsers:
// track touch position and stop scroll events reaching the map
let touchStartY = 0;
panelScroll.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

panelScroll.addEventListener('touchmove', (e) => {
  const scrollTop = panelScroll.scrollTop;
  const scrollHeight = panelScroll.scrollHeight;
  const clientHeight = panelScroll.clientHeight;
  const touchY = e.touches[0].clientY;
  const direction = touchY - touchStartY;
  const atTop = scrollTop === 0 && direction > 0;
  const atBottom = scrollTop + clientHeight >= scrollHeight && direction < 0;
  if (!atTop && !atBottom) {
    e.stopPropagation();
  }
}, { passive: true });

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closePanel();
    document.getElementById('city-list').classList.remove('open');
  }
});
</script>
